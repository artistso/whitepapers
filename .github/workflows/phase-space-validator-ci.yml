name: Phase-space validator CI

on:
  push:
    paths:
      - "phase-space-identity-validator/**"
      - ".github/workflows/phase-space-validator-ci.yml"
  pull_request:
    paths:
      - "phase-space-identity-validator/**"
      - ".github/workflows/phase-space-validator-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: phase-space-identity-validator
        run: python -m pip install -e '.[dev]'
      - name: Lint
        working-directory: phase-space-identity-validator
        run: ruff check .
      - name: Test
        working-directory: phase-space-identity-validator
        run: pytest --junitxml=pytest-${{ matrix.python-version }}.xml
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: phase-space-identity-validator/pytest-${{ matrix.python-version }}.xml
          if-no-files-found: warn
          retention-days: 7
